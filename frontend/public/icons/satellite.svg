<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Military-style satellite - clean geometric -->
  <g stroke="#00e5ff" stroke-width="1.2">
    <!-- Body (central rectangle rotated 45deg) -->
    <rect x="9.5" y="9.5" width="5" height="5" rx="0.8" transform="rotate(45 12 12)" fill="#00e5ff" fill-opacity="0.3"/>
    <!-- Left solar panel -->
    <rect x="1.5" y="10" width="6" height="4" rx="0.5" fill="#00e5ff" fill-opacity="0.15" transform="rotate(-45 4.5 12)"/>
    <line x1="2.5" y1="12" x2="6.5" y2="12" stroke-opacity="0.4" transform="rotate(-45 4.5 12)"/>
    <!-- Right solar panel -->
    <rect x="16.5" y="10" width="6" height="4" rx="0.5" fill="#00e5ff" fill-opacity="0.15" transform="rotate(-45 19.5 12)"/>
    <line x1="17.5" y1="12" x2="21.5" y2="12" stroke-opacity="0.4" transform="rotate(-45 19.5 12)"/>
    <!-- Signal dot -->
    <circle cx="12" cy="12" r="1" fill="#00e5ff"/>
  </g>
</svg>
