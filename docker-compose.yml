version: '3.8'

services:
  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: geospatial-redis
    restart: unless-stopped
    networks:
      - geospatial
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geospatial-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - geospatial
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geospatial-frontend
    restart: unless-stopped
    networks:
      - geospatial

  # Nginx reverse proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: geospatial-nginx
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      - frontend
      - backend
    networks:
      - geospatial

networks:
  geospatial:
    driver: bridge
