services:
  redis:
    image: redis:7-alpine
    container_name: geospatial-redis
    restart: unless-stopped
    networks:
      - geospatial
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    image: node:20-slim
    container_name: geospatial-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node dist/index.js
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - geospatial

  nginx:
    image: nginx:alpine
    container_name: geospatial-nginx
    restart: unless-stopped
    ports:
      - "3010:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    depends_on:
      - backend
    networks:
      - geospatial

networks:
  geospatial:
    driver: bridge
